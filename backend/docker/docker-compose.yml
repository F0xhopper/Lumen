version: '3.8'

services:
  aquinas-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=INFO
    env_file:
      - ../.env
    volumes:
      - ../logs:/app/logs
    restart: unless-stopped